        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function pronounceWord(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8; // Friendly, slightly slower pace for kids
                utterance.pitch = 1.05; // Light, clear kid-friendly tone
                window.speechSynthesis.speak(utterance);
            } else {
                showToast("הקראת מילים אינה נתמכת במכשיר זה", "error");
            }
        }
        
        function playSound(type) {
            try {
                initAudio();
                if (!audioCtx) return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'success') {
                    const now = audioCtx.currentTime;
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.08);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } else if (type === 'error') {
                    const now = audioCtx.currentTime;
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(160, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.25);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } else if (type === 'click') {
                    const now = audioCtx.currentTime;
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } else if (type === 'win') {
                    const now = audioCtx.currentTime;
                    const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
                    notes.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(freq, now + idx * 0.08);
                        g.gain.setValueAtTime(0.12, now + idx * 0.08);
                        g.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.35);
                        o.start(now + idx * 0.08);
                        o.stop(now + idx * 0.08 + 0.4);
                    });
                }
            } catch (e) {
                console.log('Audio disabled/failed:', e);
            }
        }

        async function triggerFirebaseConnection() {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-english-practice';
            const userIdBadge = document.getElementById('user-id-badge');

            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = window.F_initializeApp(firebaseConfig);
                    const db = window.F_getFirestore(app);
                    const auth = window.F_getAuth(app);

                    const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                    let userCred;
                    if (initialToken) {
                        userCred = await window.F_signInWithCustomToken(auth, initialToken);
                    } else {
                        userCred = await window.F_signInAnonymously(auth);
                    }

                    const user = userCred.user;
                    state.firebase = {
                        enabled: true,
                        db: db,
                        auth: auth,
                        appId: appId,
                        userId: user.uid
                    };

                    userIdBadge.innerText = `מזהה משתמש: ${user.uid}`;
                    
                    setupRealtimeBucketsListener();
                } catch (err) {
                    console.error("Failed to connect with Firebase. Running in Offline mode.", err);
                    userIdBadge.innerText = "מצב לא מקוון (Offline Mode)";
                }
            } else {
                userIdBadge.innerText = "מצב לא מקוון (Offline Mode)";
            }

            // Fallback render if Firebase takes time or fails
            if (state.view === 'settings') {
                renderView();
            }
        }

        function setupRealtimeBucketsListener() {
            if (!state.firebase.enabled) return;
            const db = state.firebase.db;
            const appId = state.firebase.appId;

            // Strict collection reference path
            const collectionRef = window.F_collection(db, 'artifacts', appId, 'public', 'data', 'saved_buckets');

            // Listen for realtime cloud updates
            window.F_onSnapshot(collectionRef, (snapshot) => {
                state.savedBuckets = [];
                snapshot.forEach((doc) => {
                    state.savedBuckets.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });

                // In-memory sort by creation time (newest first)
                state.savedBuckets.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                if (state.view === 'settings' && state.settingsTab === 'cloud') {
                    renderSavedBucketsList();
                }
            }, (error) => {
                console.error("Realtime update error for buckets:", error);
                showToast("שגיאה בחיבור לענן המילים", "error");
            });
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bg = 'bg-emerald-600';
            let icon = 'fa-circle-check';
            if (type === 'error') {
                bg = 'bg-rose-600';
                icon = 'fa-circle-exclamation';
            } else if (type === 'info') {
                bg = 'bg-indigo-600';
                icon = 'fa-circle-info';
            }

            toast.className = `${bg} text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 font-bold text-sm text-center animate-slide-in pointer-events-auto`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-all', 'duration-300', '-translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function navigate(targetView) {
            playSound('click');
            state.view = targetView;
            if (targetView !== 'quiz') {
                clearInterval(state.quiz.timerInterval);
            }
            renderView();
        }

        function renderView() {
            const container = document.getElementById('view-container');
            container.innerHTML = '';
            
            if (state.view === 'settings') {
                renderSettings(container);
            } else if (state.view === 'quiz') {
                renderQuiz(container);
            } else if (state.view === 'results') {
                renderResults(container);
            }
        }

        function renderSettings(container) {
            container.className = "animate-pop flex flex-col justify-between h-full";
            
            const isManualEmpty = state.settings.creationMode === 'manual' && state.settings.manualWords.length === 0;

            container.innerHTML = `

                    <p class="text-gray-500 text-xs mt-0.5">תרגול אינטראקטיבי מהמהם לגילאי 8 עד 12</p>
                </div>

                <!-- Navigation Tabs between settings generator and Cloud buckets list -->
                <div class="flex rounded-2xl bg-indigo-50 p-1 mb-4 border border-indigo-100">
                    <button onclick="setSettingsTab('create')" class="flex-1 py-2 text-center text-xs font-black rounded-xl transition-all ${state.settingsTab === 'create' ? 'bg-indigo-600 text-white shadow' : 'text-indigo-700 hover:text-indigo-950'}">

                    <button onclick="setSettingsTab('cloud')" class="flex-1 py-2 text-center text-xs font-black rounded-xl transition-all ${state.settingsTab === 'cloud' ? 'bg-indigo-600 text-white shadow' : 'text-indigo-700 hover:text-indigo-950'}">

                    </button>
                </div>

                <!-- Dynamic Workspace panel depending on Active Tab -->
                <div class="flex-grow overflow-y-auto px-1 max-h-[340px] md:max-h-none pr-1" id="settings-workspace">
                    ${state.settingsTab === 'create' ? renderCreateSettingsForm() : renderSavedBucketsSection()}
                </div>

                <!-- Footer action to start -->
                <div class="mt-4 pt-3 border-t border-indigo-50">
                    ${state.settingsTab === 'create' ? `
                        <button onclick="${isManualEmpty ? 'void(0)' : 'startVocabularyPractice(false)'}" 
                            id="start-practice-btn"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-base py-3.5 px-6 rounded-2xl shadow-lg hover:shadow-xl transition-all disabled:bg-gray-300 disabled:cursor-not-allowed disabled:shadow-none"
                            ${isManualEmpty ? 'disabled' : ''}>
                            בואו נתחיל לשחק! <i class="fa-solid fa-circle-play mr-1"></i>
                        </button>
                    ` : `
                        <p class="text-center text-xs text-indigo-500 font-bold">בחרו דלי מתוך הרשימה מעל כדי להתחיל לתרגל!</p>
                    `}
                </div>
            `;
        }

        function setSettingsTab(tab) {
            playSound('click');
            state.settingsTab = tab;
            renderView();

        function addManualWord() {
            const engEl = document.getElementById('manual-english');
            const hebEl = document.getElementById('manual-hebrew');
            const emoEl = document.getElementById('manual-emoji');

            if (!engEl || !hebEl) return;

            const english = engEl.value.trim().toLowerCase();
            const hebrew = hebEl.value.trim();
            const emoji = (emoEl && emoEl.value.trim()) ? emoEl.value.trim() : '✏️';

            if (!english || !hebrew) {
                showToast("אנא מלאו את המילה באנגלית ותרגומה בעברית", "error");
                return;
            }

            // Standard character check
            if (!/^[a-zA-Z\s-]+$/.test(english)) {
                showToast("המילה באנגלית חייבת להכיל אותיות באנגלית בלבד", "error");
                return;
            }

            state.settings.manualWords.push({
                english: english,
                hebrew: hebrew,
                emoji: emoji,
                category: 'custom'
            });

            playSound('click');
            renderView();
            showToast("המילה הוספה בהצלחה!");
            
            // Refocus english field for seamless typing flow
            setTimeout(() => {
                const newEngEl = document.getElementById('manual-english');
                if (newEngEl) newEngEl.focus();
            }, 50);
        }

        function deleteManualWord(index) {
            playSound('click');
            state.settings.manualWords.splice(index, 1);
            renderView();
        }

        function loadBucketForEditing() {
            const select = document.getElementById('load-bucket-select');
            if (!select) return;
            const bucketId = select.value;
            if (!bucketId) {
                showToast("אנא בחרו דלי מהרשימה", "error");
                return;
            }
            playSound('click');
            const bucket = state.savedBuckets.find(b => b.id === bucketId);
            if (!bucket) {
                showToast("דלי המילים לא נמצא", "error");
                return;
            }
            // Populate manualWords with existing bucket words
            state.settings.manualWords = bucket.words.map(w => ({ ...w }));
            state.settings.editingBucketId = bucket.id;
            state.settings.editingBucketName = bucket.name;
            renderView();
            showToast(`הדלי "${bucket.name}" נטען בהצלחה! תוכלו להוסיף או להסיר מילים.`, "success");
        }

        function cancelEditingBucket() {
            playSound('click');
            state.settings.manualWords = [];
            state.settings.editingBucketId = null;
            state.settings.editingBucketName = null;
            renderView();
            showToast("העריכה בוטלה והרשימה רוקנה", "info");
        }

        function clearAllManualWords() {
            playSound('click');
            state.settings.manualWords = [];
            state.settings.editingBucketId = null;
            state.settings.editingBucketName = null;
            renderView();
            showToast("הדלי הידני רוקן לחלוטין", "info");

                return `

                        <i class="fa-solid fa-cloud-slash text-4xl text-rose-400 mb-2"></i>
                        <h4 class="font-black text-rose-800 text-sm">הענן אינו מחובר</h4>
                        <p class="text-rose-600 text-xs px-4 mt-1">כדי להשתמש בדליים השמורים בענן, יש להפעיל את האפליקציה בסביבה מקוונת התומכת בשרת.</p>

                <div class="space-y-2" id="buckets-realtime-list">
                    ${renderSavedBucketsList()}
                </div>
            `;
        }

        function renderSavedBucketsList() {
            const listEl = document.getElementById('buckets-realtime-list');
            if (state.savedBuckets.length === 0) {
                const emptyHtml = `
                    <div class="text-center py-12 bg-indigo-50/50 border border-indigo-100 rounded-2xl">
                        <i class="fa-solid fa-folder-open text-4xl text-indigo-300 mb-2"></i>
                        <h4 class="font-black text-indigo-900 text-sm">אין עדיין דליים שמורים בענן</h4>
                        <p class="text-indigo-600 text-[10px] px-6 mt-1">שחקו משחק, ובסיום תוכלו לשמור את המילים שלכם בענן כדי שהן יופיעו כאן לכולם!</p>
                    </div>
                `;
                if (listEl) listEl.innerHTML = emptyHtml;
                return emptyHtml;
            }

            const listHtml = state.savedBuckets.map(b => {
                const emojis = b.words.slice(0, 6).map(w => w.emoji).join(' ');
                const dateStr = b.createdAt ? new Date(b.createdAt).toLocaleDateString('he-IL') : 'תאריך לא ידוע';
                return `
                    <div class="p-3 bg-white border border-indigo-100 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-2 hover:border-indigo-300 hover:shadow-sm transition-all">
                        <div class="flex-grow">
                            <h4 class="font-black text-indigo-950 text-sm leading-tight">${escapeHtml(b.name)}</h4>
                            <div class="flex items-center gap-1.5 text-[10px] text-indigo-500 font-bold mt-1">
                                <span class="bg-indigo-50 px-2 py-0.5 rounded-full">${b.words.length} מילים</span>
                                <span>•</span>
                                <span>נוצר ב-${dateStr}</span>
                            </div>
                            <div class="text-base select-none mt-1.5 filter drop-shadow-sm">${emojis} ${b.words.length > 6 ? '...' : ''}</div>
                        </div>
                        <div class="flex gap-1.5 w-full md:w-auto">
                            <button onclick="playSavedCloudBucket('${b.id}')" 
                                class="flex-1 md:flex-none bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs px-3.5 py-2 rounded-xl transition-all shadow-sm">
                                <i class="fa-solid fa-play ml-1"></i>התחל תרגול
                            </button>
                            ${b.createdBy === state.firebase.userId ? `
                                <button onclick="deleteSavedCloudBucket('${b.id}')" 
                                    class="bg-rose-50 hover:bg-rose-100 text-rose-500 p-2 rounded-xl transition-all border border-rose-100" title="מחק דלי">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (listEl) listEl.innerHTML = listHtml;
            return listHtml;
        }

        function playSavedCloudBucket(bucketId) {
            playSound('click');
            const targetBucket = state.savedBuckets.find(b => b.id === bucketId);
            if (!targetBucket) {
                showToast("לא מצאנו את דלי המילים המבוקש", "error");
                return;
            }

            // Map standard layout with initial properties
            state.quiz.bucket = targetBucket.words.map(w => {
                const wordCopy = { ...w };
                wordCopy.options = generateMultipleChoiceDistractors(wordCopy);
                wordCopy.userAnswer = null;
                wordCopy.isCorrect = false;
                return wordCopy;
            }).sort(() => Math.random() - 0.5);

            state.quiz.loadedBucketName = targetBucket.name;

            // Reset quiz metrics
            state.quiz.currentIndex = 0;
            state.quiz.timeElapsed = 0;
            state.quiz.currentInput = '';
            state.quiz.isAnswerChecked = false;
            state.quiz.isCorrect = false;
            state.quiz.timeOutReached = false;

            // Start timer
            startPracticeTimer();
            navigate('quiz');
        }

        async function deleteSavedCloudBucket(bucketId) {
            playSound('click');
            if (!state.firebase.enabled) return;

            const db = state.firebase.db;
            const appId = state.firebase.appId;

            showConfirmDialog("האם אתם בטוחים שברצונכם למחוק לצמיתות דלי מילים זה?", async () => {
                try {
                    const docRef = window.F_doc(db, 'artifacts', appId, 'public', 'data', 'saved_buckets', bucketId);
                    await window.F_deleteDoc(docRef);
                    showToast("הדלי נמחק בהצלחה!", "success");
                } catch (e) {
                    console.error("Error deleting bucket:", e);
                    showToast("שגיאה במחיקת הדלי מהענן", "error");
                }
            });
        }

        function setWordCount(count) {
            playSound('click');
            state.settings.wordCount = count;
            renderView();
        }

        function setCategory(cat) {
            playSound('click');
            state.settings.category = cat;
            renderView();
        }

        function setGameMode(mode) {
            playSound('click');
            state.settings.mode = mode;
            renderView();
        }

        function startVocabularyPractice(isRepeat = false) {
            state.quiz.loadedBucketName = null; // Fresh session

            if (!isRepeat) {
                let pool = [];
                if (state.settings.creationMode === 'manual') {
                    pool = [...state.settings.manualWords];
                    state.quiz.editingBucketId = state.settings.editingBucketId;
                    state.quiz.editingBucketName = state.settings.editingBucketName;
                } else {
                    pool = VOCABULARY_DATABASE;
                    if (state.settings.category !== 'all') {
                        pool = VOCABULARY_DATABASE.filter(w => w.category === state.settings.category);
                    }
                    state.quiz.editingBucketId = null;
                    state.quiz.editingBucketName = null;
                }
                
                pool = [...pool].sort(() => Math.random() - 0.5);
                
                const count = state.settings.creationMode === 'manual' 
                    ? pool.length 
                    : Math.min(state.settings.wordCount, pool.length);

                state.quiz.bucket = pool.slice(0, count).map(word => {
                    const distractors = generateMultipleChoiceDistractors(word);
                    return {
                        ...word,
                        options: distractors,
                        userAnswer: null,
                        isCorrect: false
                    };
                });
            } else {
                state.quiz.bucket.forEach(word => {
                    word.userAnswer = null;
                    word.isCorrect = false;
                });
                state.quiz.bucket = state.quiz.bucket.sort(() => Math.random() - 0.5);
            }

            state.quiz.currentIndex = 0;
            state.quiz.timeElapsed = 0;
            state.quiz.currentInput = '';
            state.quiz.isAnswerChecked = false;
            state.quiz.isCorrect = false;
            state.quiz.timeOutReached = false;

            startPracticeTimer();
            navigate('quiz');
        }

        function startPracticeTimer() {
            clearInterval(state.quiz.timerInterval);
            if (state.settings.timerDuration > 0) {
                state.quiz.startTime = Date.now();
                state.quiz.timerInterval = setInterval(() => {
                    state.quiz.timeElapsed = Math.floor((Date.now() - state.quiz.startTime) / 1000);
                    
                    const totalSecs = state.settings.timerDuration * 60;
                    const timeLeft = totalSecs - state.quiz.timeElapsed;
                    
                    if (timeLeft <= 0) {
                        clearInterval(state.quiz.timerInterval);
                        state.quiz.timeOutReached = true;
                        finishPractice();
                        return;
                    }

                    const timerEl = document.getElementById('timer-display');
                    if (timerEl) {
                        timerEl.innerText = formatTime(timeLeft);
                        if (timeLeft <= 10) {
                            timerEl.parentElement.className = "flex items-center space-x-1 space-x-reverse font-mono px-3 py-1 rounded-xl border border-red-200 text-red-600 bg-red-50 animate-pulse transition-all";
                        }
                    }
                }, 1000);
            }
        }

        function formatTime(sec) {
            if (sec < 0) sec = 0;
            const mins = Math.floor(sec / 60);
            const remainingSecs = sec % 60;
            return `${mins.toString().padStart(2, '0')}:${remainingSecs.toString().padStart(2, '0')}`;
        }

        function generateMultipleChoiceDistractors(word) {
            const correctMeaning = word.hebrew;
            const optionsSet = new Set([correctMeaning]);
            
            const pool = VOCABULARY_DATABASE.filter(w => w.hebrew !== correctMeaning);
            const sameCatPool = pool.filter(w => w.category === word.category);
            
            const sourcePool = sameCatPool.length >= 3 ? sameCatPool : pool;
            const shuffledSource = [...sourcePool].sort(() => Math.random() - 0.5);

            while(optionsSet.size < 4 && shuffledSource.length > 0) {
                const item = shuffledSource.pop();
                optionsSet.add(item.hebrew);
            }

            return Array.from(optionsSet).sort(() => Math.random() - 0.5);
        }

        function renderQuiz(container) {
            container.className = "animate-pop flex flex-col justify-between h-full";

                    </button>
                    
                    <div class="flex items-center gap-2">
                        ${timerHtml}

                </div>

                <!-- Progress Bar -->
                <div class="w-full bg-gray-100 h-2 rounded-full mb-6 overflow-hidden">
                    <div class="bg-indigo-600 h-full rounded-full transition-all duration-300" style="width: ${progressPercent}%"></div>
                </div>

                <!-- Main Display Section -->
                <div id="quiz-workspace" class="flex-grow flex flex-col justify-center items-center py-2 relative">
                    
                    <!-- Word Box Card -->
                    <div class="text-center mb-6 w-full">
                        
                        ${state.settings.mode === 'multiple' ? `
                            <!-- English word displayed large (Multiple choice mode) -->
                            <div class="flex items-center justify-center gap-3 mb-2 animate-pop">
                                <h2 class="english-font text-4xl md:text-5xl font-extrabold text-indigo-900 leading-tight tracking-wide select-none">
                                    ${currentWord.english}
                                </h2>
                                <button onclick="pronounceWord('${currentWord.english}')" 
                                    class="w-12 h-12 bg-indigo-100 hover:bg-indigo-200 text-indigo-600 rounded-2xl flex items-center justify-center transition-all shadow-md active:scale-95" 
                                    title="השמע מילה באנגלית">
                                    <i class="fa-solid fa-volume-high text-xl"></i>
                                </button>
                            </div>
                            <p class="text-gray-400 text-sm mt-1 font-bold">מה הפירוש הנכון בעברית?</p>
                        ` : `
                            <!-- Hebrew word displayed (Spelling/Keyboard mode) -->
                            <h2 class="text-3xl md:text-4xl font-black text-indigo-900 leading-tight select-none mb-3">
                                ${currentWord.hebrew}
                            </h2>
                            <div class="flex justify-center mb-3">
                                <button onclick="pronounceWord('${currentWord.english}')" 
                                    class="flex items-center gap-2 px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-xl transition-all shadow-sm font-bold text-xs border border-indigo-100 active:scale-95 animate-pop" 
                                    title="השמע מילה באנגלית">
                                    <i class="fa-solid fa-volume-high"></i> השמעת המילה באנגלית

        function renderOptionsList(word) {
            let html = `<div class="grid grid-cols-2 gap-3">`;
            word.options.forEach((option) => {
                let btnStyles = "bg-white hover:bg-indigo-50 text-gray-800 border-2 border-gray-200 hover:border-indigo-400";
                let iconHtml = "";

                if (state.quiz.isAnswerChecked) {
                    if (option === word.hebrew) {
                        btnStyles = "bg-green-100 text-green-800 border-2 border-green-500 shadow-md";
                        iconHtml = '<i class="fa-solid fa-circle-check text-green-600 mr-2"></i>';
                    } else if (state.quiz.currentInput === option && !state.quiz.isCorrect) {
                        btnStyles = "bg-rose-100 text-rose-800 border-2 border-rose-500";
                        iconHtml = '<i class="fa-solid fa-circle-xmark text-rose-600 mr-2"></i>';
                    } else {
                        btnStyles = "bg-gray-50 text-gray-400 border border-gray-200 opacity-60 pointer-events-none";
                    }
                }

                html += `
                    <button onclick="selectOption('${escapeHtml(option)}')" ${state.quiz.isAnswerChecked ? 'disabled' : ''}
                        class="p-4 rounded-2xl font-black text-xl shadow-sm transition-all duration-200 flex items-center justify-center transform hover:scale-[1.02] active:scale-[0.98] ${btnStyles}">
                        <span>${escapeHtml(option)}</span>
                        ${iconHtml}
                    </button>
                `;
            });
            html += `</div>`;
            return html;

        function renderSpellingKeyboard() {
            const layout = [
                ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
                ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
                ['CLEAR', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
            ];

            let html = `<div class="flex flex-col gap-2 items-center">`;
            layout.forEach(row => {
                html += `<div class="flex gap-1 justify-center w-full">`;
                row.forEach(key => {
                    let btnStyle = "bg-white text-gray-800 border border-gray-200 hover:border-indigo-200 hover:bg-gray-50 text-xs font-bold p-2.5 rounded-lg shadow-sm min-w-[28px] md:min-w-[36px] text-center uppercase";
                    let action = `spellingKeyPress('${key}')`;

                    if (key === 'CLEAR') {
                        btnStyle = "bg-orange-50 text-orange-600 border border-orange-200 font-extrabold text-[10px] px-2 rounded-lg";
                    } else if (key === '⌫') {
                        btnStyle = "bg-rose-50 text-rose-500 border border-rose-200 font-extrabold text-sm px-2 rounded-lg";
                    }

                    if (state.quiz.isAnswerChecked) {
                        action = '';
                        btnStyle += ' opacity-50 cursor-not-allowed pointer-events-none';
                    }

                    html += `
                        <button onclick="${action}" class="transition-all transform active:scale-95 ${btnStyle}">
                            ${key}
                        </button>
                    `;
                });
                html += `</div>`;
            });
            html += `</div>`;
            return html;
        }

        function spellingKeyPress(key) {
            if (state.quiz.isAnswerChecked) return;
            playSound('click');

            if (key === 'CLEAR') {
                state.quiz.currentInput = '';
            } else if (key === '⌫') {
                state.quiz.currentInput = state.quiz.currentInput.slice(0, -1);
            } else {
                if (state.quiz.currentInput.length < 20) {
                    state.quiz.currentInput += key.toLowerCase();
                }
            }

            const field = document.getElementById('spelling-field');
            if (field) {
                field.value = state.quiz.currentInput;
            }

            const checkBtn = document.getElementById('check-answer-btn');
            if (checkBtn) {
                checkBtn.disabled = state.quiz.currentInput === '';
            }
        }

        function selectOption(val) {
            if (state.quiz.isAnswerChecked) return;
            state.quiz.currentInput = val;
            checkVocabularyAnswer();
        }

        function checkVocabularyAnswer() {
            if (state.quiz.currentInput === '') return;

            const currentQ = state.quiz.bucket[state.quiz.currentIndex];
            let isCorrect = false;

            if (state.settings.mode === 'multiple') {
                isCorrect = state.quiz.currentInput === currentQ.hebrew;
            } else {
                isCorrect = state.quiz.currentInput.trim().toLowerCase() === currentQ.english.trim().toLowerCase();
            }

            state.quiz.isAnswerChecked = true;
            state.quiz.isCorrect = isCorrect;
            currentQ.isCorrect = isCorrect;
            currentQ.userAnswer = state.quiz.currentInput;

            const workspace = document.getElementById('quiz-workspace');
            
            if (isCorrect) {
                playSound('success');
                workspace.innerHTML += `
                    <div class="absolute inset-0 flex items-center justify-center bg-green-500 bg-opacity-10 pointer-events-none rounded-3xl animate-pop">
                        <div class="bg-green-500 text-white rounded-full p-4 shadow-lg text-4xl animate-bounce">
                            <i class="fa-solid fa-check"></i>
                        </div>
                    </div>
                `;
            } else {
                playSound('error');
                workspace.classList.add('animate-shake');
                setTimeout(() => workspace.classList.remove('animate-shake'), 400);

                workspace.innerHTML += `
                    <div class="absolute inset-0 flex items-center justify-center bg-rose-500 bg-opacity-10 pointer-events-none rounded-3xl animate-pop">
                        <div class="bg-rose-500 text-white rounded-full p-4 shadow-lg text-4xl">
                            <i class="fa-solid fa-xmark"></i>
                        </div>
                    </div>
                `;
            }

            const actionArea = document.getElementById('action-area');
            if (actionArea) {
                actionArea.innerHTML = renderActionControls();
            }
        }

        function renderActionControls() {
            const currentQ = state.quiz.bucket[state.quiz.currentIndex];
            const isLast = state.quiz.currentIndex === state.quiz.bucket.length - 1;

            if (!state.quiz.isAnswerChecked) {
                if (state.settings.mode === 'spelling') {
                    return `
                        <button onclick="checkVocabularyAnswer()" ${state.quiz.currentInput === '' ? 'disabled' : ''} id="check-answer-btn"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-extrabold text-lg py-3.5 px-6 rounded-2xl shadow-md hover:shadow-lg transition-all">
                            בדיקת איות <i class="fa-solid fa-spell-check mr-1.5"></i>
                        </button>
                    `;
                } else {
                    return `<p class="text-center text-sm font-bold text-gray-500">בחרו את התרגום הנכון</p>`;
                }
            } else {
                const nextText = isLast ? 'סיום ולתוצאות' : 'שאלה הבאה';
                const nextIcon = isLast ? 'fa-flag-checkered' : 'fa-arrow-left';
                
                let feedback = '';
                if (state.quiz.isCorrect) {
                    feedback = `<span class="text-green-600 font-extrabold text-base"><i class="fa-solid fa-circle-check ml-1.5"></i>מעולה! נכון מאוד.</span>`;
                } else {
                    const translation = state.settings.mode === 'multiple' 
                        ? `הפירוש הוא: <b>${currentQ.hebrew}</b>` 
                        : `הכתיב הנכון: <b class="english-font uppercase">${currentQ.english}</b>`;
                    feedback = `<span class="text-rose-600 font-bold text-sm"><i class="fa-solid fa-circle-xmark ml-1.5"></i>לא מדויק. ${translation}</span>`;
                }

                return `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="text-center md:text-right">
                            ${feedback}
                        </div>
                        <button onclick="nextWord()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 px-8 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2">
                            ${nextText} <i class="fa-solid ${nextIcon}"></i>
                        </button>
                    </div>
                `;
            }
        }

        function nextWord() {
            playSound('click');
            if (state.quiz.currentIndex < state.quiz.bucket.length - 1) {
                state.quiz.currentIndex++;
                state.quiz.currentInput = '';
                state.quiz.isAnswerChecked = false;
                state.quiz.isCorrect = false;
                renderView();
            } else {
                finishPractice();
            }
        }

        function finishPractice() {
            clearInterval(state.quiz.timerInterval);
            
            const correctCount = state.quiz.bucket.filter(q => q.isCorrect).length;
            if (correctCount === state.quiz.bucket.length && !state.quiz.timeOutReached) {
                playSound('win');
                triggerRainbowConfetti();
            } else {
                playSound('success');
            }

            state.view = 'results';
            renderView();
        }

        function setupPhysicalKeyboardListeners() {
            window.onkeydown = null;
            window.onkeydown = function(e) {
                if (state.view !== 'quiz' || state.settings.mode !== 'spelling') return;
                
                if (state.quiz.isAnswerChecked) {
                    if (e.key === 'Enter') {
                        nextWord();
                    }
                    return;
                }

                if (e.key.length === 1 && e.key.match(/[a-z]/i)) {
                    spellingKeyPress(e.key.toLowerCase());
                } else if (e.key === 'Backspace') {
                    spellingKeyPress('⌫');
                } else if (e.key === 'Escape') {
                    spellingKeyPress('CLEAR');
                } else if (e.key === 'Enter') {
                    if (state.quiz.currentInput !== '') {
                        checkVocabularyAnswer();
                    }
                }
            };
        }

        function renderResults(container) {
            container.className = "animate-pop flex flex-col justify-between h-full";
            
            const total = state.quiz.bucket.length;
            const correct = state.quiz.bucket.filter(w => w.isCorrect).length;

            let subtitle = '';
            let bgCircle = '';

                bgCircle = 'bg-rose-100 text-rose-800 border-rose-300';

                title = 'אלופי האנגלית! 👑🇬🇧';
                subtitle = 'מדהים! עניתם נכון על כל המילים בסבב הזה!';
                bgCircle = 'bg-indigo-600 text-white border-indigo-700';
            } else if (percentage >= 80) {
                title = 'עבודה מעולה! 🌟';
                subtitle = 'כל הכבוד! אתם שולטים היטב במילים הללו!';
                bgCircle = 'bg-emerald-100 text-emerald-800 border-emerald-300';
            } else if (percentage >= 50) {
                title = 'כל הכבוד על המאמץ! 👍';
                subtitle = 'עוד קצת שינון ותהיו מושלמים!';
                bgCircle = 'bg-amber-100 text-amber-800 border-amber-300';
            } else {
                title = 'אל ייאוש, ממשיכים להתאמן! 💪';
                subtitle = 'מומלץ לתרגל שוב את אותו סל מילים כדי ללמוד אותן טוב יותר!';
                bgCircle = 'bg-rose-100 text-rose-800 border-rose-300';
            }

            container.innerHTML = `
                <!-- Main Header Results -->
                <div class="text-center mb-2">
                    <h2 class="text-2xl font-black text-indigo-900 mb-0.5">${title}</h2>
                    <p class="text-gray-500 text-xs">${subtitle}</p>
                </div>

                <!-- Score Metric and Cloud Saving Button -->
                <div class="flex items-center justify-center gap-4 mb-3">
                    <div class="w-20 h-20 rounded-full flex flex-col items-center justify-center font-black text-xl border-4 shadow-inner ${bgCircle}">
                        <span>${percentage}%</span>
                        <span class="text-[8px] font-black uppercase tracking-wider">ציון</span>
                    </div>

                    ${state.firebase.enabled ? `
                        <button onclick="triggerSaveBucketModal()" 
                            class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-4 py-3 rounded-2xl flex flex-col items-center justify-center transition-all duration-150 transform hover:scale-105">
                            <i class="fa-solid fa-cloud-arrow-up text-lg mb-1"></i>
                            <span class="text-xs font-black">שמירת דלי זה בענן</span>
                        </button>
                    ` : ''}
                </div>

                <!-- Detailed review scroll pane -->
                <div class="flex-grow overflow-y-auto max-h-[140px] bg-gray-50 p-3 rounded-2xl border border-gray-100 mb-4 pr-2">
                    <h3 class="text-xs font-black text-gray-700 mb-2 border-b border-gray-200 pb-1">המילים שלקחו חלק בסבב:</h3>
                    <div class="space-y-1.5">
                        ${state.quiz.bucket.map((word, idx) => {
                            const isCorrect = word.isCorrect;
                            const statusColor = isCorrect ? 'text-emerald-700 bg-emerald-50' : 'text-rose-700 bg-rose-50';
                            const icon = isCorrect ? 'fa-circle-check text-emerald-500' : 'fa-circle-xmark text-rose-500';
                            return `
                                <div class="flex items-center justify-between p-2 rounded-xl text-xs font-bold ${statusColor}">
                                    <div class="flex items-center gap-1.5">
                                        <i class="fa-solid ${icon}"></i>
                                        <button onclick="pronounceWord('${word.english}')" 
                                            class="p-1 bg-white hover:bg-indigo-100 text-indigo-600 rounded-lg transition-all border border-indigo-200 shadow-sm ml-1 shrink-0 flex items-center justify-center active:scale-95" 
                                            title="השמע מילה">
                                            <i class="fa-solid fa-volume-high text-[10px]"></i>
                                        </button>
                                        <span class="english-font font-black tracking-wide uppercase">${word.english}</span>
                                        <span class="text-gray-400 font-bold">=</span>
                                        <span>${word.hebrew}</span>

                                    <div class="font-bold">
                                        שלכם: <span class="english-font uppercase">${word.userAnswer || 'לא נענה'}</span>

                    </div>

                <!-- Action Bucket Controls -->

        function triggerSaveBucketModal() {
            playSound('click');
            const modal = document.getElementById('save-bucket-modal');
            const input = document.getElementById('bucket-name-input');
            const actionsContainer = document.getElementById('save-bucket-actions');

            let origBucket = null;
            if (state.quiz.editingBucketId) {
                origBucket = state.savedBuckets.find(b => b.id === state.quiz.editingBucketId);
            }

            // Set suggested default name
            if (origBucket) {
                if (origBucket.createdBy === state.firebase.userId) {
                    input.value = origBucket.name;
                } else {
                    input.value = `עותק של ${origBucket.name}`;
                }
            } else {
                const currentCatName = state.settings.category === 'all' ? 'מילים מגוונות' : state.settings.category;
                input.value = `דלי ${currentCatName} של ${state.firebase.userId ? state.firebase.userId.slice(0, 4) : 'אורח'}`;
            }

            modal.classList.remove('hidden');

            // Render buttons dynamically based on editing context
            let buttonsHtml = '';
            if (origBucket && origBucket.createdBy === state.firebase.userId) {
                buttonsHtml = `
                    <button id="save-bucket-update" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3 rounded-xl shadow-md transition-all duration-150">
                        <i class="fa-solid fa-pen-to-square ml-1"></i>עדכן דלי קיים בענן
                    </button>
                    <button id="save-bucket-copy" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl shadow-md transition-all duration-150">
                        <i class="fa-solid fa-copy ml-1"></i>שמור כעותק חדש
                    </button>
                `;
            } else {
                buttonsHtml = `
                    <button id="save-bucket-confirm" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl shadow-md transition-all duration-150">
                        שמור בענן
                    </button>
                `;
            }
            buttonsHtml += `
                <button id="save-bucket-cancel" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-extrabold py-3 rounded-xl transition-all duration-150">
                    ביטול
                </button>
            `;

            actionsContainer.innerHTML = buttonsHtml;

            const cancelBtn = document.getElementById('save-bucket-cancel');
            cancelBtn.onclick = function() {
                playSound('click');
                modal.classList.add('hidden');
            };

            const confirmBtn = document.getElementById('save-bucket-confirm');
            if (confirmBtn) {
                confirmBtn.onclick = async function() {
                    const bucketName = input.value.trim();
                    if (!bucketName) {
                        showToast("אנא הזינו שם לדלי המילים", "error");
                        return;
                    }
                    playSound('click');
                    modal.classList.add('hidden');
                    await saveActiveBucketToCloud(bucketName);
                };
            }

            const updateBtn = document.getElementById('save-bucket-update');
            if (updateBtn) {
                updateBtn.onclick = async function() {
                    const bucketName = input.value.trim();
                    if (!bucketName) {
                        showToast("אנא הזינו שם לדלי המילים", "error");
                        return;
                    }
                    playSound('click');
                    modal.classList.add('hidden');
                    await updateExistingBucketInCloud(origBucket.id, bucketName);
                };
            }

            const copyBtn = document.getElementById('save-bucket-copy');
            if (copyBtn) {
                copyBtn.onclick = async function() {
                    const bucketName = input.value.trim();
                    if (!bucketName) {
                        showToast("אנא הזינו שם לדלי המילים", "error");
                        return;
                    }
                    playSound('click');
                    modal.classList.add('hidden');
                    await saveActiveBucketToCloud(bucketName);
                };
            }
        }

        async function saveActiveBucketToCloud(bucketName) {
            if (!state.firebase.enabled) {
                showToast("החיבור לענן אינו פעיל", "error");
                return;
            }

            const db = state.firebase.db;
            const appId = state.firebase.appId;

            // Deep clean words from user session flags to keep the database pure
            const wordsToSave = state.quiz.bucket.map(w => ({
                english: w.english,
                hebrew: w.hebrew,
                category: w.category || 'custom',
                emoji: w.emoji || '✏️'
            }));

            try {
                const collectionRef = window.F_collection(db, 'artifacts', appId, 'public', 'data', 'saved_buckets');
                
                await window.F_addDoc(collectionRef, {
                    name: bucketName,
                    words: wordsToSave,
                    createdBy: state.firebase.userId,
                    createdAt: Date.now()
                });

                showToast(`הדלי "${bucketName}" נשמר בהצלחה בענן! ✨`);
            } catch (err) {
                console.error("Error saving custom bucket:", err);
                showToast("שגיאה בשמירת הדלי בענן", "error");
            }
        }

        async function updateExistingBucketInCloud(bucketId, bucketName) {
            if (!state.firebase.enabled) {
                showToast("החיבור לענן אינו פעיל", "error");
                return;
            }

            const db = state.firebase.db;
            const appId = state.firebase.appId;

            const wordsToSave = state.quiz.bucket.map(w => ({
                english: w.english,
                hebrew: w.hebrew,
                category: w.category || 'custom',
                emoji: w.emoji || '✏️'
            }));

            try {
                const docRef = window.F_doc(db, 'artifacts', appId, 'public', 'data', 'saved_buckets', bucketId);
                
                await window.F_updateDoc(docRef, {
                    name: bucketName,
                    words: wordsToSave,
                    updatedAt: Date.now()
                });

                showToast(`הדלי "${bucketName}" עודכן בהצלחה בענן! ✨`);
            } catch (err) {
                console.error("Error updating custom bucket:", err);
                showToast("שגיאה בעדכון הדלי בענן", "error");
            }
        }

        async function saveManualEditsToCloud() {
            if (!state.firebase.enabled) {
                showToast("החיבור לענן אינו פעיל", "error");
                return;
            }
            if (!state.settings.editingBucketId) {
                showToast("אין דלי פעיל לעדכון", "error");
                return;
            }

            const db = state.firebase.db;
            const appId = state.firebase.appId;

            // Deep clean words from user session flags to keep the database pure
            const wordsToSave = state.settings.manualWords.map(w => ({
                english: w.english.trim().toLowerCase(),
                hebrew: w.hebrew.trim(),
                category: w.category || 'custom',
                emoji: w.emoji || '✏️'
            }));

            if (wordsToSave.length === 0) {
                showToast("לא ניתן לשמור דלי ריק ממילים", "error");
                return;
            }

            try {
                const docRef = window.F_doc(db, 'artifacts', appId, 'public', 'data', 'saved_buckets', state.settings.editingBucketId);
                
                await window.F_updateDoc(docRef, {
                    words: wordsToSave,
                    updatedAt: Date.now()
                });

                showToast(`הדלי "${state.settings.editingBucketName}" עודכן בהצלחה בענן! 💾✨`, "success");
            } catch (err) {
                console.error("Error saving manual edits directly:", err);
                showToast("שגיאה בעדכון השינויים בענן", "error");
            }
        }

        function showConfirmDialog(msg, callback) {
            const modal = document.getElementById('custom-confirm-modal');
            const body = document.getElementById('confirm-modal-body');
            const yes = document.getElementById('confirm-modal-yes');
            const no = document.getElementById('confirm-modal-no');

            body.innerText = msg;
            modal.classList.remove('hidden');

            yes.onclick = function() {
                playSound('click');
                modal.classList.add('hidden');
                callback();
            };

            no.onclick = function() {
                playSound('click');
                modal.classList.add('hidden');
            };
        }

        function confirmExit() {
            playSound('click');
            showConfirmDialog("האם ברצונכם לצאת מהתרגול הנוכחי ולחזור למסך הגדרות המשחק?", () => {
                navigate('settings');
            });
        }

        function triggerRainbowConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.classList.remove('hidden');
            
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;
            
            window.addEventListener('resize', () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });

            const confettiParts = [];
            const palette = ['#fbbf24', '#f87171', '#34d399', '#60a5fa', '#a78bfa', '#f472b6'];

            for (let i = 0; i < 120; i++) {
                confettiParts.push({
                    x: Math.random() * w,
                    y: Math.random() * h - h,
                    size: Math.random() * 5 + 4,
                    density: Math.random() * h,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    tilt: Math.random() * 8 - 4,
                    tiltAngleIncremental: Math.random() * 0.08 + 0.02,
                    tiltAngle: 0
                });
            }

            let frames = 0;
            function run() {
                ctx.clearRect(0, 0, w, h);
                confettiParts.forEach((cp, idx) => {
                    cp.tiltAngle += cp.tiltAngleIncremental;
                    cp.y += (Math.cos(cp.density) + 2.5 + cp.size / 2) / 2;
                    cp.x += Math.sin(cp.tiltAngle);
                    cp.tilt = Math.sin(cp.tiltAngle - idx / 4) * 12;

                    ctx.beginPath();
                    ctx.lineWidth = cp.size;
                    ctx.strokeStyle = cp.color;
                    ctx.moveTo(cp.x + cp.tilt + cp.size / 2, cp.y);
                    ctx.lineTo(cp.x + cp.tilt, cp.y + cp.tilt + cp.size / 2);
                    ctx.stroke();
                });

                frames++;
                if (frames < 280) {
                    requestAnimationFrame(run);
                } else {
                    canvas.classList.add('hidden');
                    ctx.clearRect(0, 0, w, h);
                }
            }
            run();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
